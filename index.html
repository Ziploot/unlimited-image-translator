<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZipLoot - Cloud Image Translator & Lens</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Syne:wght@700;800&family=Space+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0f19;
      --card-bg: rgba(255, 255, 255, 0.02);
      --border: rgba(255, 255, 255, 0.05);
      --primary: #818cf8;
      --success: #10b981;
      --text: #cbd5e1;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      border-bottom: 1px solid var(--border);
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(11, 15, 25, 0.8);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      background: linear-gradient(135deg, #818cf8 0%, #10b981 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }
    .container {
      max-width: 900px;
      width: 100%;
      margin: 40px auto;
      padding: 0 20px;
      flex: 1;
    }
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 30px;
      backdrop-filter: blur(10px);
      margin-bottom: 30px;
    }
    h2 { font-family: 'Syne', sans-serif; font-size: 18px; margin-bottom: 15px; color: #fff; }
    .upload-zone {
      border: 2px dashed rgba(129, 140, 248, 0.3);
      border-radius: 12px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 20px;
      position: relative;
    }
    .upload-zone:hover {
      border-color: var(--primary);
      background: rgba(129, 140, 248, 0.02);
    }
    .upload-zone img { max-width: 100%; max-height: 300px; border-radius: 8px; margin-top: 15px; display: none; }
    
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: #94a3b8; }
    select {
      width: 100%;
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      margin-bottom: 20px;
      outline: none;
    }
    
    .actions-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin-bottom: 20px;
    }
    .btn {
      padding: 14px;
      border-radius: 8px;
      border: none;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      background: linear-gradient(135deg, #818cf8 0%, #10b981 100%);
      color: #fff;
      box-shadow: 0 4px 15px rgba(129, 140, 248, 0.3);
      transition: all 0.2s ease;
      text-align: center;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(129, 140, 248, 0.4); }
    .btn-lens { background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%); box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3); }
    .btn-lens:hover { box-shadow: 0 6px 20px rgba(245, 158, 11, 0.4); }

    .result-container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-top: 25px;
      display: none;
    }
    .result-box {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      min-height: 150px;
      max-height: 300px;
      overflow-y: auto;
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      white-space: pre-wrap;
    }
    .status-text { font-size: 14px; color: var(--primary); text-align: center; margin-top: 10px; display: none; }
  </style>
  <script src="https://unpkg.com/tesseract.js@5.0.5/dist/tesseract.min.js"></script>

<style>
  .s-widget:has(.ad-block) { padding: 20px 10px !important; }
  .s-widget .ad-block { display: flex; justify-content: center; align-items: center; width: 100% !important; overflow: visible !important; }
  .s-widget .ad-block iframe { max-width: 100% !important; }
</style>
</head>
<body>
  <header>
    <div class="logo">⚡ ZIPLOOT LENS</div>
  </header>
  
  <div class="container">
    <div class="card">
      <h2>📸 Upload Image for Translation &amp; Lens Search</h2>
      <div class="upload-zone" onclick="document.getElementById('imageInput').click()">
        <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="handleImage(this.files[0])" />
        <div id="uploadPrompt">
          <h3>Click or Drag Image Here</h3>
          <p>Supports PNG, JPG, JPEG formats</p>
        </div>
        <img loading="lazy" id="imagePreview" alt="Upload Preview" />
      </div>

      <div class="actions-grid">
        <div>
          <label>Source Language</label>
          <select id="sourceLang">
            <option value="auto">Auto Detect</option>
            <option value="en">English</option>
            <option value="fr">French</option>
            <option value="es">Spanish</option>
            <option value="de">German</option>
            <option value="bn">Bengali</option>
          </select>
        </div>
        <div>
          <label>Target Language</label>
          <select id="targetLang">
            <option value="bn">Bengali</option>
            <option value="en" selected>English</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
          </select>
        </div>
      </div>

      <div class="actions-grid">
        <button class="btn" onclick="processTranslation()">TRANSLATE TEXT</button>
        <button class="btn btn-lens" onclick="searchGoogleLens()">SEARCH GOOGLE LENS</button>
      </div>

      <div class="status-text" id="statusText">Processing OCR...</div>

      <!-- Results Grid -->
      <div class="result-container" id="resultContainer">
        <div>
          <label>Extracted Text (OCR)</label>
          <div class="result-box" id="ocrResult"></div>
        </div>
        <div>
          <label>Translated Text</label>
          <div class="result-box" id="translationResult"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Hidden Google Lens Form Submission Hack -->
  <form id="lensForm" action="https://lens.google.com/upload" method="POST" enctype="multipart/form-data" target="_blank" style="display: none;">
    <input type="file" name="encoded_image" id="lensFile" />
  </form>

  <script>
    let activeFile = null;

    function handleImage(file) {
      if (!file) return;
      activeFile = file;

      // Copy file reference to hidden Google Lens Form
      const dataTransfer = new DataTransfer();
      dataTransfer.items.add(file);
      document.getElementById('lensFile').files = dataTransfer.files;

      // Preview Image
      const reader = new FileReader();
      reader.onload = function(e) {
        document.getElementById("uploadPrompt").style.display = "none";
        const preview = document.getElementById("imagePreview");
        preview.src = e.target.result;
        preview.style.display = "block";
      };
      reader.readAsDataURL(file);
    }

    async function processTranslation() {
      if (!activeFile) {
        alert("Please upload an image first.");
        return;
      }

      const status = document.getElementById("statusText");
      const results = document.getElementById("resultContainer");
      status.style.display = "block";
      status.textContent = "Processing OCR (Reading image)...";
      results.style.display = "none";

      try {
        // Run OCR using Tesseract.js Client-Side
        const ocrData = await Tesseract.recognize(activeFile, 'eng+fra+spa+deu');
        const extractedText = ocrData.data.text.trim();
        document.getElementById("ocrResult").textContent = extractedText || "No text detected in image.";

        if (!extractedText) {
          status.style.display = "none";
          results.style.display = "grid";
          return;
        }

        // Run Translation using Google's Undocumented Client-Side CORS Endpoint
        status.textContent = "Translating text...";
        const sl = document.getElementById("sourceLang").value;
        const tl = document.getElementById("targetLang").value;
        
        const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sl}&tl=${tl}&dt=t&q=${encodeURIComponent(extractedText)}`;
        const res = await fetch(url);
        const data = await res.json();
        const translatedText = data[0].map(item => item[0]).join('');

        document.getElementById("translationResult").textContent = translatedText;
        status.style.display = "none";
        results.style.display = "grid";
      } catch (err) {
        status.style.display = "none";
        alert("Error during translation: " + err.toString());
      }
    }

            async function searchGoogleLens() {
      if (!activeFile) {
        alert("Please upload an image first.");
        return;
      }
      
      // Find the Google Lens search button
      const buttons = document.querySelectorAll("button");
      let lensBtn = null;
      for (const btn of buttons) {
        if (btn.textContent.includes("SEARCH GOOGLE LENS")) {
          lensBtn = btn;
          break;
        }
      }
      
      const originalText = lensBtn ? lensBtn.innerHTML : "SEARCH GOOGLE LENS";
      if (lensBtn) {
        lensBtn.disabled = true;
        lensBtn.style.opacity = "0.7";
        lensBtn.innerHTML = '<span class="spinner" style="display:inline-block; width:12px; height:12px; border:2px solid #fff; border-top-color:transparent; border-radius:50%; animation:spin 1s linear infinite; margin-right:8px;"></span>Uploading...';
      }

      // 1. Immediately open a blank tab synchronously to bypass browser popup blockers
      const newTab = window.open("about:blank", "_blank");
      if (newTab) {
        newTab.document.write('<div style="font-family:sans-serif; text-align:center; padding-top:100px; color:#475569;"><h3>Redirecting to Google Lens...</h3><p>Processing secure cloud upload...</p></div>');
      }

      try {
        console.log("Uploading via secure Vercel API proxy...");
        // Send file binary data directly to Vercel Serverless Function
        // Using "text/plain" to bypass CORS Preflight (OPTIONS) checks by browsers
        const res = await fetch("https://same-favorite-joke-keeps.trycloudflare.com/api/upload-lens", {
          method: "POST",
          headers: {
            "Content-Type": "text/plain"
          },
          body: activeFile
        });
        
        const data = await res.json();
        
        if (data.success && data.url) {
          const lensUrl = `https://lens.google.com/uploadbyurl?url=${encodeURIComponent(data.url)}`;
          if (newTab) {
            newTab.location.href = lensUrl;
          }
        } else {
          throw new Error(data.error || "Upload failed");
        }
      } catch (err) {
        console.warn("Vercel proxy upload failed:", err);
        if (newTab) {
          newTab.close(); // Close the blank tab
        }
        // Diagnostic alert so we know exactly why it fails in the browser
        alert("Google Lens Upload Error: " + err.toString());
        // Fallback: Try classic form submit
        document.getElementById("lensForm").submit();
      } finally {
        if (lensBtn) {
          lensBtn.disabled = false;
          lensBtn.style.opacity = "1";
          lensBtn.innerHTML = originalText;
        }
      }
    }
  </script>

</body>
</html>
